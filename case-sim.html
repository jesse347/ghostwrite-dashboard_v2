<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ghostwrite · case simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--s1:#0f0f0f;--s2:#161616;--s3:#1e1e1e;--border:#222;
  --accent:#e8ff47;--text:#efefef;--muted:#666;--muted2:#444;
  --mono:'Space Mono',monospace;--display:'Unbounded',sans-serif;
  --green:#3ddc84;--red:#ff4455;--orange:#ff9f43;
  --fire:#ff2d2d;--chrome:#a8c8ff;--gold:#ffd700;--emerald:#2ecc71;
  --victory:#e8ff47;--base:#555;--sp:#c084fc;--vides:#ff9f43;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);min-height:100vh}
body{color:var(--text);font-family:var(--mono);font-size:12px}

.nav{display:flex;align-items:center;padding:14px 32px;border-bottom:1px solid var(--border);gap:24px;position:sticky;top:0;background:var(--bg);z-index:50}
.nav-logo{font-family:var(--display);font-size:13px;font-weight:700;color:var(--accent);letter-spacing:2px;text-decoration:none}
.nav-links{display:flex;gap:20px;margin-left:auto}
.nav-link{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.15s}
.nav-link:hover,.nav-link.active{color:var(--text)}

.page{max-width:1100px;margin:0 auto;padding:32px}
.page-header{margin-bottom:28px}
.page-title{font-family:var(--display);font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:6px}
.page-title em{color:var(--accent);font-style:normal}
.page-sub{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}

.set-selector{display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap}
.set-btn{font-family:var(--display);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 16px;cursor:pointer;background:var(--s2);border:1px solid var(--border);color:var(--muted);transition:all 0.15s}
.set-btn:hover{color:var(--text);border-color:var(--muted2)}.set-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
.stat-card{background:var(--s1);border:1px solid var(--border);padding:18px 20px}
.stat-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-value{font-family:var(--display);font-size:24px;font-weight:700;letter-spacing:-1px}
.stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}.stat-value.accent{color:var(--accent)}
.stat-sub{font-size:9px;color:var(--muted);margin-top:4px}

.sim-area{background:var(--s1);border:1px solid var(--border);padding:24px}
.sim-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.sim-title{font-family:var(--display);font-size:13px;font-weight:700;letter-spacing:1px}
.sim-controls{display:flex;gap:8px;align-items:center}

.pull-btn{font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:10px 24px;cursor:pointer;background:var(--accent);color:#000;border:none;transition:all 0.15s}
.pull-btn:hover{background:#fff}.pull-btn:disabled{background:var(--s3);color:var(--muted);cursor:not-allowed}
.reset-btn{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:10px 16px;cursor:pointer;background:transparent;color:var(--muted);border:1px solid var(--border);transition:all 0.15s}
.reset-btn:hover{color:var(--text);border-color:var(--muted2)}

.case-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:20px}
.box-slot{aspect-ratio:1;background:var(--s2);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;position:relative;transition:border-color 0.2s,background 0.2s;cursor:default}
.box-slot.is-hit{cursor:pointer}.box-slot.is-hit:hover{filter:brightness(1.12)}
.box-slot.revealed{animation:reveal 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards}
@keyframes reveal{0%{transform:scale(0.8) rotateY(90deg);opacity:0}60%{transform:scale(1.05);opacity:1}100%{transform:scale(1);opacity:1}}
.box-slot.is-fire{border-color:var(--fire);background:rgba(255,45,45,0.07)}
.box-slot.is-chrome{border-color:var(--chrome);background:rgba(168,200,255,0.05)}
.box-slot.is-gold{border-color:var(--gold);background:rgba(255,215,0,0.06)}
.box-slot.is-emerald{border-color:var(--emerald);background:rgba(46,204,113,0.05)}
.box-slot.is-victory{border-color:var(--victory);background:rgba(232,255,71,0.04)}
.box-slot.is-sp{border-color:var(--sp);background:rgba(192,132,252,0.05)}
.box-slot.is-vides{border-color:var(--vides);background:rgba(255,159,67,0.05)}
.box-slot.guaranteed-slot:not(.revealed){border-color:var(--muted2);border-style:dashed}
.box-num{position:absolute;top:5px;left:7px;font-size:7px;color:var(--muted2);letter-spacing:1px}
.box-empty-icon{font-size:18px;opacity:0.12}
.box-variant-badge{font-family:var(--display);font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 5px;margin-bottom:4px}
.box-player{font-size:7px;color:var(--text);text-align:center;line-height:1.3;max-width:100%;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.box-price{font-family:var(--display);font-size:12px;font-weight:700;margin-top:3px}
.box-price.estimated{color:var(--muted)}
.box-est-badge{position:absolute;top:4px;right:4px;font-size:6px;font-family:var(--display);font-weight:700;letter-spacing:0.5px;padding:1px 4px;color:var(--accent);background:rgba(232,255,71,0.12);border:1px solid rgba(232,255,71,0.3)}
.box-click-hint{position:absolute;bottom:4px;right:5px;font-size:6px;color:var(--muted2);opacity:0;transition:opacity 0.15s}
.box-slot.is-hit:hover .box-click-hint{opacity:1}

.result-bar{display:none;border-top:1px solid var(--border);padding-top:20px;align-items:center;gap:32px;flex-wrap:wrap}
.result-bar.visible{display:flex}
.result-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.result-big{font-family:var(--display);font-size:28px;font-weight:700;letter-spacing:-1px}
.result-big.green{color:var(--green)}.result-big.red{color:var(--red)}
.result-breakdown{margin-left:auto;font-size:9px;color:var(--muted);line-height:1.8;text-align:right}

.prob-row{margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.prob-title{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.prob-bars{display:flex;flex-direction:column;gap:6px}
.prob-item{display:flex;align-items:center;gap:10px}
.prob-variant{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;width:64px;text-align:right;flex-shrink:0}
.prob-bar-wrap{flex:1;background:var(--s3);height:3px}
.prob-bar{height:100%;transition:width 0.5s ease}
.prob-pct{font-size:9px;color:var(--muted);width:60px;flex-shrink:0}
.prob-odds{font-size:8px;color:var(--muted2);flex-shrink:0}

.history-section{margin-top:28px}
.history-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.history-label::after{content:'';flex:1;height:1px;background:var(--border)}
.history-table{width:100%;border-collapse:collapse}
.history-table th{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:6px 10px;text-align:left;border-bottom:1px solid var(--border)}
.history-table td{font-size:10px;padding:8px 10px;border-bottom:1px solid rgba(34,34,34,0.5);color:var(--muted)}
.history-table td:first-child{color:var(--muted2);font-size:9px}
.history-table td.hit-col{font-weight:700}
.history-table td.green{color:var(--green)}.history-table td.red{color:var(--red)}

.loading-state{padding:60px;text-align:center;color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase}
.loading-dot{display:inline-block;animation:ld 1.2s infinite}
.loading-dot:nth-child(2){animation-delay:0.2s}.loading-dot:nth-child(3){animation-delay:0.4s}
@keyframes ld{0%,100%{opacity:0.2}50%{opacity:1}}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:90;opacity:0;pointer-events:none;transition:opacity 0.2s}
.overlay.visible{opacity:1;pointer-events:all}
.drawer{position:fixed;right:0;top:0;bottom:0;width:390px;background:var(--s1);border-left:1px solid var(--border);z-index:100;transform:translateX(100%);transition:transform 0.25s ease;overflow-y:auto;padding:28px}
.drawer.open{transform:translateX(0)}
.drawer-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px 8px}
.drawer-close:hover{color:var(--text)}
.d-player{font-family:var(--display);font-size:15px;font-weight:700;margin-bottom:2px}
.d-variant{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
.d-section{margin-bottom:20px}
.d-section-title{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.d-stat{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.d-stat-label{font-size:9px;color:var(--muted)}
.d-stat-val{font-size:11px;color:var(--text)}
.d-stat-val.accent{color:var(--accent);font-family:var(--display)}
.proj-final{background:rgba(232,255,71,0.06);border:1px solid rgba(232,255,71,0.25);padding:16px;text-align:center}
.proj-final-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.proj-final-val{font-family:var(--display);font-size:30px;font-weight:700;color:var(--accent)}
.proj-final-note{font-size:9px;color:var(--muted);margin-top:8px;line-height:1.5}
.sales-hero{background:rgba(232,255,71,0.06);border:1px solid rgba(232,255,71,0.25);padding:16px;text-align:center;margin-bottom:20px}
.sales-hero-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.sales-hero-val{font-family:var(--display);font-size:30px;font-weight:700;color:var(--accent)}
.sales-hero-sub{font-size:9px;color:var(--muted);margin-top:6px}
.listing-card{display:flex;gap:10px;align-items:flex-start;padding:10px;margin-bottom:6px;background:var(--s2);border:1px solid var(--border)}
.listing-img{width:44px;height:44px;object-fit:cover;flex-shrink:0;background:var(--s3)}
.listing-img-ph{width:44px;height:44px;flex-shrink:0;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:18px;opacity:0.3}
.listing-body{flex:1;min-width:0}
.listing-meta{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
.listing-price{font-family:var(--display);font-size:14px;font-weight:700;color:var(--accent)}
.listing-date{font-size:9px;color:var(--muted2)}
.listing-link{font-size:8px;color:var(--muted);text-decoration:none}.listing-link:hover{color:var(--text)}
.afa-badge{font-size:8px;color:#ffd700}
.no-listings{font-size:9px;color:var(--muted2);letter-spacing:1px;padding:16px 0;text-align:center}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">ghostwrite</a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">dashboard</a>
    <a href="guide.html" class="nav-link">price guide</a>
    <a href="heatmap.html" class="nav-link">heat map</a>
    <a href="case-sim.html" class="nav-link active">case sim</a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-title">case <em>simulator</em></div>
    <div class="page-sub">guaranteed hit mechanic · real + projected values · click any hit to inspect</div>
  </div>
  <div id="main-content">
    <div class="loading-state">loading<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">✕</button>
  <div class="d-player" id="d-player"></div>
  <div class="d-variant" id="d-variant"></div>
  <div id="d-body"></div>
</div>

<script>
// ── Supabase ──────────────────────────────────────────────────────────────────
const SB_URL='https://sabzbyuqrondoayhwoth.supabase.co';
const SB_KEY='sb_publishable_KAbUO5YvOapq_kWkHqt7BA_UTwrP60s';
const SB_H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
async function rpc(fn,p={}){const r=await fetch(`${SB_URL}/rest/v1/rpc/${fn}`,{method:'POST',headers:SB_H,body:JSON.stringify(p)});if(!r.ok)throw new Error(`${fn}: ${r.status}`);return r.json();}

// ── Config ────────────────────────────────────────────────────────────────────
const SET_CONFIG=[
  {match:['nba','game face','2024'],casePrice:500,casePack:12,label:'NBA 2024–25'},
  {match:['wnba','game face','2024'],casePrice:500,casePack:12,label:'WNBA 2024'},
  {match:['mlb','game face','2025'],casePrice:425,casePack:12,label:'MLB 2025'},
  {match:['nba','game face','2025'],casePrice:500,casePack:12,label:'NBA 2025–26'},
  {match:['wnba','game face','2025'],casePrice:500,casePack:12,label:'WNBA 2025'},
];
function getSetConfig(setName){
  const lo=(setName||'').toLowerCase();
  const ordered=[...SET_CONFIG].sort((a,b)=>b.match.join('').length-a.match.join('').length);
  for(const cfg of ordered){if(cfg.match.every(kw=>lo.includes(kw)))return cfg;}
  return null;
}

const VORD=['Base','Victory','Vides','Emerald','Gold','Chrome','Fire','SP'];
const VCOL={Base:'var(--base)',Victory:'var(--victory)',Vides:'var(--vides)',Emerald:'var(--emerald)',Gold:'var(--gold)',Chrome:'var(--chrome)',Fire:'var(--fire)',SP:'var(--sp)'};
const VPROX={
  'Base':   {'Victory':0.9,'Vides':0.85,'Emerald':0.85,'Gold':0.75,'Chrome':0.6,'Fire':0.4,'SP':0.8},
  'Victory':{'Base':0.9,'Vides':0.9,'Emerald':0.9,'Gold':0.8,'Chrome':0.65,'Fire':0.45,'SP':0.85},
  'Emerald':{'Base':0.85,'Victory':0.9,'Vides':0.95,'Gold':0.9,'Chrome':0.7,'Fire':0.5,'SP':0.8},
  'Vides':  {'Base':0.85,'Victory':0.9,'Emerald':0.95,'Gold':0.9,'Chrome':0.7,'Fire':0.5,'SP':0.8},
  'Gold':   {'Base':0.75,'Victory':0.8,'Emerald':0.9,'Vides':0.9,'Chrome':0.85,'Fire':0.65,'SP':0.7},
  'Chrome': {'Base':0.6,'Victory':0.65,'Emerald':0.7,'Vides':0.7,'Gold':0.85,'Fire':0.8,'SP':0.6},
  'Fire':   {'Base':0.4,'Victory':0.45,'Emerald':0.5,'Vides':0.5,'Gold':0.65,'Chrome':0.8,'SP':0.4},
  'SP':     {'Base':0.8,'Victory':0.85,'Emerald':0.8,'Vides':0.8,'Gold':0.7,'Chrome':0.6,'Fire':0.4},
};
const POP={'Fire':1,'Chrome':5,'Gold':10,'Emerald':25,'Vides':25,'Victory':50,'SP':50,'Base':1000};

// ── State ─────────────────────────────────────────────────────────────────────
let allProducts=[],recentSales=[];
let activeSet=null,simHistory=[],isAnimating=false,lastPulls=[];

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadData(){
  try{
    const[pi,sales]=await Promise.all([
      rpc('get_price_intelligence'),
      rpc('get_recent_sales',{limit_rows:500}),
    ]);
    allProducts=pi.filter(r=>r.player&&r.player!=='Unknown').map(r=>({
      set:r.set_name,player:r.player,variant:r.variant,
      totalSales:+r.total_sales||0,avgPrice:+r.avg_price||0,
      avg30d:+r.avg_30d||0,sales30d:+r.sales_30d||0,
      avg90d:+r.avg_90d||0,sales90d:+r.sales_90d||0,
      lastSaleDate:r.last_sale_date,lastSalePrice:+r.last_sale_price||0,
    }));
    recentSales=sales.filter(r=>r.player&&r.player!=='Unknown').map(r=>({
      id:r.id,set:r.set_name,player:r.player,variant:r.variant,
      price:+r.price||0,date:r.date,image:r.image_url,url:r.ebay_url,afa:r.afa_grade,
    }));
    initPage();
  }catch(e){
    document.getElementById('main-content').innerHTML=`<div class="loading-state" style="color:#ff4455">failed: ${e.message}</div>`;
  }
}

function initPage(){
  const sets=[...new Set(allProducts.map(p=>p.set))].filter(s=>getSetConfig(s)!==null);
  if(!sets.length){
    document.getElementById('main-content').innerHTML='<div class="loading-state" style="color:#ff4455">no matching sets found</div>';
    return;
  }
  activeSet=sets[0];
  renderPage(sets);
}

function renderPage(sets){
  document.getElementById('main-content').innerHTML=`
    <div class="set-selector" id="set-selector"></div>
    <div class="stats-row" id="stats-row"></div>
    <div class="sim-area">
      <div class="sim-header">
        <div class="sim-title">open a case</div>
        <div class="sim-controls">
          <button class="reset-btn" onclick="resetSim()">reset</button>
          <button class="pull-btn" id="pull-btn" onclick="runSimulation()">▶ open case</button>
        </div>
      </div>
      <div class="case-grid" id="case-grid"></div>
      <div class="result-bar" id="result-bar"></div>
      <div class="prob-row" id="prob-row"></div>
    </div>
    <div class="history-section" id="history-section" style="display:none">
      <div class="history-label">simulation history</div>
      <table class="history-table"><thead><tr><th>#</th><th>set</th><th>cost</th><th>hit</th><th>value</th><th>roi</th></tr></thead>
      <tbody id="history-body"></tbody></table>
    </div>`;
  renderSetSelector(sets);
  renderStats();
  renderEmptyGrid();
  renderProbabilities();
}

function renderSetSelector(sets){
  document.getElementById('set-selector').innerHTML=sets.map(s=>
    `<button class="set-btn ${s===activeSet?'active':''}" onclick="switchSet(${JSON.stringify(s)})">${(getSetConfig(s)||{label:s}).label}</button>`
  ).join('');
}

function switchSet(s){
  activeSet=s;simHistory=[];lastPulls=[];
  const sets=[...new Set(allProducts.map(p=>p.set))].filter(s=>getSetConfig(s)!==null);
  renderSetSelector(sets);renderStats();renderEmptyGrid();renderProbabilities();
  document.getElementById('result-bar').classList.remove('visible');
  document.getElementById('history-section').style.display='none';
  isAnimating=false;
  document.getElementById('pull-btn').disabled=false;
  closeDrawer();
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats(){
  const cfg=getSetConfig(activeSet)||{casePrice:500,casePack:12};
  const products=allProducts.filter(p=>p.set===activeSet);
  const basePrices=products.filter(p=>p.variant==='Base'&&p.avgPrice>0).map(p=>p.avgPrice);
  const avgBase=basePrices.length?Math.round(basePrices.reduce((a,b)=>a+b,0)/basePrices.length):0;
  const{projections}=buildProjections(products);
  let wSum=0,wTotal=0;
  VORD.filter(v=>v!=='Base').forEach(v=>{
    const pop=POP[v];if(!pop)return;
    const seen=new Set(),prices=[];
    products.filter(p=>p.variant===v&&p.avgPrice>0).forEach(p=>{seen.add(p.player);prices.push(p.avgPrice);});
    products.forEach(p=>{if(seen.has(p.player))return;const pr=projections[p.player+'|||'+v];if(pr&&pr.price>0){seen.add(p.player);prices.push(pr.price);}});
    if(!prices.length)return;
    wSum+=(prices.reduce((a,b)=>a+b,0)/prices.length)*pop;wTotal+=pop;
  });
  const avgHit=wTotal>0?Math.round(wSum/wTotal):0;
  const{hitPool,remainingPool}=buildSplitPools();
  let ev=0;
  if(hitPool.length&&remainingPool.length){
    const ha=hitPool.reduce((s,f)=>s+f.price,0)/hitPool.length;
    const ra=remainingPool.reduce((s,f)=>s+f.price,0)/remainingPool.length;
    ev=Math.round(ha+ra*(cfg.casePack-1));
  }
  const roi=ev>0?Math.round((ev-cfg.casePrice)/cfg.casePrice*100):0;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="stat-label">case retail</div><div class="stat-value">$${cfg.casePrice}</div><div class="stat-sub">${cfg.casePack} figures · 1 guaranteed hit</div></div>
    <div class="stat-card"><div class="stat-label">avg base value</div><div class="stat-value accent">$${avgBase||'—'}</div><div class="stat-sub">${basePrices.length} players w/ data</div></div>
    <div class="stat-card"><div class="stat-label">avg hit value</div><div class="stat-value" style="color:var(--gold)">$${avgHit||'—'}</div><div class="stat-sub">population-weighted</div></div>
    <div class="stat-card"><div class="stat-label">expected ROI</div><div class="stat-value ${roi>=0?'green':'red'}">${roi>=0?'+':''}${roi}%</div><div class="stat-sub">est. value $${ev.toLocaleString()}</div></div>`;
}

// ── Grid ──────────────────────────────────────────────────────────────────────
function renderEmptyGrid(){
  const cfg=getSetConfig(activeSet)||{casePack:12};
  let html='';
  for(let i=0;i<cfg.casePack;i++){
    const g=i===0?'guaranteed-slot':'';
    html+=`<div class="box-slot ${g}" id="slot-${i}"><span class="box-num">${i+1}</span>${i===0?'<span class="box-empty-icon" style="color:var(--accent);opacity:0.25">★</span>':'<span class="box-empty-icon">◻</span>'}</div>`;
  }
  document.getElementById('case-grid').innerHTML=html;
}

// ── Probabilities ─────────────────────────────────────────────────────────────
function renderProbabilities(){
  const{hitPool,fullPool}=buildSplitPools();
  if(!hitPool.length)return;
  const cfg=getSetConfig(activeSet)||{casePack:12};
  const totalCases=fullPool.length/cfg.casePack;
  const byV={};hitPool.forEach(f=>{byV[f.variant]=(byV[f.variant]||0)+1;});
  const vars=VORD.filter(v=>v!=='Base'&&byV[v]);
  document.getElementById('prob-row').innerHTML=`
    <div class="prob-title">guaranteed hit · variant distribution per case</div>
    <div class="prob-bars">${vars.map(v=>{
      const n=byV[v]||0,pct=n/totalCases*100;
      const dp=pct<0.1?pct.toFixed(3):pct<1?pct.toFixed(2):pct.toFixed(1);
      const oddsN=n>0?totalCases/n:0;
      const oddsStr=oddsN>=10?'1:'+Math.round(oddsN).toLocaleString()+' cases':oddsN.toFixed(1)+' per case';
      return`<div class="prob-item"><span class="prob-variant" style="color:${VCOL[v]||'var(--muted)'}">${v}</span><div class="prob-bar-wrap"><div class="prob-bar" style="width:${Math.min(100,pct)}%;background:${VCOL[v]||'var(--muted)'}"></div></div><span class="prob-pct">${dp}%</span><span class="prob-odds">${oddsStr}</span></div>`;
    }).join('')}</div>`;
}

// ── Pool builder ──────────────────────────────────────────────────────────────
function buildSplitPools(){
  const{pool}=buildPool();
  const cfg=getSetConfig(activeSet)||{casePack:12};
  const hitPool=pool.filter(f=>f.variant!=='Base');
  const basePool=pool.filter(f=>f.variant==='Base');
  const totalCases=Math.round(pool.length/cfg.casePack);
  const remainingParallelCount=Math.max(0,hitPool.length-totalCases);
  const shuffled=[...hitPool].sort(()=>Math.random()-0.5);
  const remainingParallels=shuffled.slice(0,remainingParallelCount);
  const remainingPool=[...basePool,...remainingParallels];
  return{hitPool,fullPool:pool,remainingPool,totalCases};
}

function buildPool(){
  const products=allProducts.filter(p=>p.set===activeSet);
  const{projections}=buildProjections(products);
  const pool=[];
  [...new Set(products.map(p=>p.player))].forEach(player=>{
    products.filter(p=>p.player===player).forEach(pv=>{
      const pop=POP[pv.variant];if(!pop)return;
      const price=getPrice(player,pv.variant,products,projections);if(!price)return;
      for(let i=0;i<pop;i++){pool.push({player,variant:pv.variant,price:price.value,isEstimated:price.estimated,confidence:price.confidence,projData:price.projData||null,realData:price.realData||null});}
    });
  });
  return{pool};
}

function getPrice(player,variant,products,projections){
  const real=products.find(p=>p.player===player&&p.variant===variant);
  if(real){const p=bestP(real);if(p)return{value:p,estimated:false,confidence:'real',realData:real};}
  const proj=projections[player+'|||'+variant];
  if(proj&&proj.price>0)return{value:proj.price,estimated:true,confidence:proj.confidence,projData:proj};
  const vp=products.filter(p=>p.variant===variant&&p.avgPrice>0).map(p=>p.avgPrice);
  if(vp.length)return{value:Math.round(vp.reduce((a,b)=>a+b,0)/vp.length),estimated:true,confidence:'set-avg'};
  return null;
}

function bestP(p){if(!p)return null;if(p.avg30d&&p.sales30d>=1)return p.avg30d;if(p.avg90d&&p.sales90d>=1)return p.avg90d;if(p.avgPrice&&p.totalSales>=1)return p.avgPrice;return null;}

// ── Projection engine ─────────────────────────────────────────────────────────
function buildProjections(setProducts){
  const byPlayer={};
  setProducts.forEach(p=>{if(!byPlayer[p.player])byPlayer[p.player]={};byPlayer[p.player][p.variant]=p;});
  const allVars=[...new Set(setProducts.map(p=>p.variant))];
  const crossRatios={};
  allVars.forEach(vA=>allVars.forEach(vB=>{
    if(vA===vB)return;
    const key=vA+'|||'+vB;crossRatios[key]=[];
    Object.values(byPlayer).forEach(pv=>{
      const dA=bestPFull(pv[vA]),dB=bestPFull(pv[vB]);
      if(dA&&dB&&dA.price>0&&dB.price>0)crossRatios[key].push({ratio:dA.price/dB.price,salesA:dA.sales,salesB:dB.sales});
    });
  }));
  function wmedian(pairs){
    if(!pairs.length)return null;
    const s=[...pairs].sort((a,b)=>a.ratio-b.ratio);
    const tw=s.reduce((t,p)=>t+Math.min(p.salesA||1,p.salesB||1),0);
    let cw=0;for(const p of s){cw+=Math.min(p.salesA||1,p.salesB||1);if(cw>=tw/2)return{ratio:p.ratio,n:pairs.length};}
    return{ratio:s[Math.floor(s.length/2)].ratio,n:pairs.length};
  }
  const setRatios={};Object.entries(crossRatios).forEach(([k,pairs])=>{const r=wmedian(pairs);if(r)setRatios[k]=r;});
  const projections={};
  Object.entries(byPlayer).forEach(([player,variants])=>{
    const known=Object.keys(variants).filter(v=>variants[v]?.avgPrice>0);
    if(!known.length)return;
    allVars.forEach(tv=>{
      if(variants[tv]?.avgPrice>0)return;
      if(!setProducts.some(p=>p.variant===tv))return;
      const anchors=[];
      known.forEach(sv=>{
        const rd=setRatios[tv+'|||'+sv];if(!rd)return;
        const sp=bestPFull(variants[sv]);if(!sp)return;
        const prox=(VPROX[tv]||{})[sv]||0.5;
        const rf=sp.recency==='30d'?1.0:sp.recency==='90d'?0.7:0.4;
        anchors.push({sourceVariant:sv,sourcePrice:Math.round(sp.price),sourceRecency:sp.recency,sourceSales:sp.sales,ratio:Math.round(rd.ratio*100)/100,ratioN:rd.n,impliedPrice:Math.round(sp.price*rd.ratio),proximity:prox,recencyFactor:rf,weight:prox*rf*Math.sqrt(sp.sales)});
      });
      if(!anchors.length)return;
      const tw=anchors.reduce((s,a)=>s+a.weight,0);
      const pp=tw>0?Math.round(anchors.reduce((s,a)=>s+a.impliedPrice*a.weight,0)/tw):Math.round(anchors[0].impliedPrice);
      const h30=anchors.some(a=>a.sourceRecency==='30d'),h90=anchors.some(a=>a.sourceRecency==='90d');
      const hp=anchors.filter(a=>a.proximity>=0.8).length;
      let conf,cs;
      if(anchors.length>=3&&h30&&hp>=2){conf='High';cs=90;}
      else if(anchors.length>=2&&(h30||h90)){conf='Medium';cs=65;}
      else if(anchors.length>=2){conf='Medium-Low';cs=45;}
      else if(anchors.length===1&&anchors[0].sourceSales>=10){conf='Low';cs=30;}
      else{conf='Very Low';cs=15;}
      projections[player+'|||'+tv]={price:pp,confidence:conf,confidenceScore:cs,anchors,playerBasePrice:Math.round(bestPFull(variants['Base'])?.price||0)};
    });
  });
  return{projections,byPlayer};
}

function bestPFull(p){
  if(!p)return null;
  if(p.avg30d&&p.sales30d>=1)return{price:p.avg30d,recency:'30d',sales:p.sales30d};
  if(p.avg90d&&p.sales90d>=1)return{price:p.avg90d,recency:'90d',sales:p.sales90d};
  if(p.avgPrice&&p.totalSales>=1)return{price:p.avgPrice,recency:'all-time',sales:p.totalSales};
  return null;
}

// ── Simulation ────────────────────────────────────────────────────────────────
function runSimulation(){
  if(isAnimating)return;
  isAnimating=true;
  document.getElementById('pull-btn').disabled=true;
  const cfg=getSetConfig(activeSet)||{casePrice:500,casePack:12};
  const{hitPool,remainingPool}=buildSplitPools();
  if(!hitPool.length){alert('Not enough parallel data to simulate yet.');isAnimating=false;document.getElementById('pull-btn').disabled=false;return;}
  const pulls=[];
  pulls.push({...hitPool[Math.floor(Math.random()*hitPool.length)],slotIndex:0,isGuaranteed:true});
  for(let i=1;i<cfg.casePack;i++){pulls.push({...remainingPool[Math.floor(Math.random()*remainingPool.length)],slotIndex:i,isGuaranteed:false});}
  lastPulls=pulls;
  pulls.forEach((pull,i)=>{
    setTimeout(()=>{
      revealSlot(i,pull);
      if(i===cfg.casePack-1)setTimeout(()=>{showResults(pulls,cfg);isAnimating=false;document.getElementById('pull-btn').disabled=false;},300);
    },i*110);
  });
}

function revealSlot(i,pull){
  const slot=document.getElementById('slot-'+i);
  const vLow=pull.variant.toLowerCase();
  const isHit=pull.variant!=='Base';
  slot.className=`box-slot revealed${isHit?' is-hit is-'+vLow:''}${pull.isGuaranteed?' guaranteed-slot':''}`;
  if(isHit)slot.setAttribute('onclick',`openHitDrawer(${i})`);
  slot.innerHTML=`
    <span class="box-num">${i+1}${pull.isGuaranteed?' ★':''}</span>
    ${isHit&&pull.isEstimated?'<span class="box-est-badge">EST</span>':''}
    <span class="box-variant-badge" style="color:${VCOL[pull.variant]||'var(--muted)'}">${pull.variant}</span>
    <span class="box-player">${pull.player}</span>
    <span class="box-price${pull.isEstimated?' estimated':''}">$${Math.round(pull.price).toLocaleString()}</span>
    ${isHit?'<span class="box-click-hint">↗ details</span>':''}`;
}

// ── Drawer ────────────────────────────────────────────────────────────────────
function openHitDrawer(i){
  const pull=lastPulls[i];
  if(!pull||pull.variant==='Base')return;
  document.getElementById('d-player').textContent=pull.player;
  document.getElementById('d-variant').textContent=pull.variant+(pull.isEstimated?' · Projected Value':' · Sales History');
  if(pull.isEstimated)renderProjectionBody(pull);
  else renderSalesBody(pull);
  document.getElementById('overlay').classList.add('visible');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer(){
  document.getElementById('overlay').classList.remove('visible');
  document.getElementById('drawer').classList.remove('open');
}

function renderProjectionBody(pull){
  const products=allProducts.filter(p=>p.set===activeSet);
  const{projections,byPlayer}=buildProjections(products);
  const proj=projections[pull.player+'|||'+pull.variant];
  if(!proj){document.getElementById('d-body').innerHTML='<div style="color:var(--muted);padding:20px 0;font-size:10px">No projection data.</div>';return;}
  const pv=byPlayer[pull.player]||{};
  const known=Object.entries(pv).filter(([,d])=>d.avgPrice>0)
    .sort((a,b)=>{const o={Base:0,Victory:1,Vides:2,Emerald:3,Gold:4,Chrome:5,Fire:6,SP:7};return(o[a[0]]??99)-(o[b[0]]??99);})
    .map(([v,d])=>{const bp=bestPFull(d);return`<div class="d-stat"><span class="d-stat-label">${v}</span><span class="d-stat-val accent">$${Math.round(d.avgPrice)} · ${d.totalSales} sales${bp?` <span style="font-size:8px;color:var(--muted)">(${bp.recency})</span>`:''}</span></div>`;}).join('');
  const anchors=proj.anchors||[];
  const tw=anchors.reduce((s,a)=>s+a.weight,0);
  const anchorHtml=anchors.length?`<div class="d-section-title">Anchors · ${anchors.length}</div>`+anchors.map(a=>{const wp=tw>0?Math.round(a.weight/tw*100):0;const rc=a.sourceRecency==='30d'?'var(--accent)':a.sourceRecency==='90d'?'#ffb347':'var(--muted)';return`<div style="background:var(--s2);border:1px solid var(--border);padding:10px 12px;margin-bottom:4px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:10px">${a.sourceVariant} → ${pull.variant}</span><span style="font-family:var(--display);color:var(--accent)">$${a.impliedPrice}</span></div><div style="font-size:9px;color:var(--muted);line-height:1.7">$${a.sourcePrice} × ${a.ratio}× = $${a.impliedPrice}<br><span style="color:${rc}">${a.sourceRecency}</span> · ${a.sourceSales} sales · proximity ${Math.round(a.proximity*100)}%</div><div style="margin-top:5px;display:flex;align-items:center;gap:6px"><div style="flex:1;height:3px;background:var(--border)"><div style="width:${Math.max(4,wp)}%;height:100%;background:var(--accent);opacity:0.6"></div></div><span style="font-size:8px;color:var(--muted)">${wp}%</span></div></div>`;}).join(''):'';
  const sc=proj.confidenceScore||0;const cc=sc>=70?'#6fcf97':sc>=40?'#ffb347':'#ff6b6b';
  document.getElementById('d-body').innerHTML=`
    <div class="d-section">
      <div class="d-section-title">Confidence</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><div style="flex:1;height:5px;background:var(--border);border-radius:3px"><div style="width:${sc}%;height:100%;background:${cc};border-radius:3px"></div></div><span style="font-family:var(--display);font-size:10px;color:${cc}">${proj.confidence}</span></div>
      <div style="font-size:9px;color:var(--muted)">${anchors.some(a=>a.sourceRecency==='30d')?'Using 30-day prices — recent data.':anchors.some(a=>a.sourceRecency==='90d')?'Using 90-day prices.':'Using all-time averages.'}</div>
    </div>
    <div class="d-section">${anchorHtml}</div>
    <div class="proj-final"><div class="proj-final-label">Projected Value</div><div class="proj-final-val">$${proj.price}</div><div class="proj-final-note">${anchors.length>1?`Weighted avg of ${anchors.length} anchors.`:anchors.length===1?`Based on ${anchors[0].sourceVariant} only.`:'Estimated.'} Actual price will vary.</div></div>
    ${known?`<div class="d-section" style="margin-top:16px"><div class="d-section-title">Known data for ${pull.player}</div>${known}</div>`:''}`;
}

function renderSalesBody(pull){
  const rd=pull.realData;
  const listings=recentSales.filter(l=>l.set===activeSet&&l.player===pull.player&&l.variant===pull.variant).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const dp=bestP(rd)||rd?.avgPrice||0;
  const sl=rd?.sales30d?`${rd.sales30d} sales in last 30d · ${rd.totalSales||0} all-time`:`${rd?.totalSales||0} total sales`;
  const listingsHtml=listings.length?listings.slice(0,20).map(l=>{
    const ds=l.date?new Date(l.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}):'—';
    const img=l.image?`<img class="listing-img" src="${l.image}" loading="lazy" onerror="this.style.display='none'">`:`<div class="listing-img-ph">👻</div>`;
    return`<div class="listing-card">${img}<div class="listing-body"><div class="listing-meta"><span class="listing-price">$${Math.round(l.price)}</span><span class="listing-date">${ds}</span>${l.afa?`<span class="afa-badge">🏆 ${l.afa}</span>`:''}${l.url?`<a class="listing-link" href="${l.url}" target="_blank" rel="noopener">↗ view</a>`:''}</div></div></div>`;
  }).join(''):'<div class="no-listings">no listings in database</div>';
  document.getElementById('d-body').innerHTML=`
    <div class="sales-hero"><div class="sales-hero-label">Market Value</div><div class="sales-hero-val">$${Math.round(dp).toLocaleString()}</div><div class="sales-hero-sub">${sl}</div></div>
    <div class="d-section">
      <div class="d-section-title">Price history</div>
      <div class="d-stat"><span class="d-stat-label">30d avg</span><span class="d-stat-val accent">${rd?.avg30d?'$'+Math.round(rd.avg30d):'—'}</span></div>
      <div class="d-stat"><span class="d-stat-label">90d avg</span><span class="d-stat-val">${rd?.avg90d?'$'+Math.round(rd.avg90d):'—'}</span></div>
      <div class="d-stat"><span class="d-stat-label">All-time avg</span><span class="d-stat-val">${rd?.avgPrice?'$'+Math.round(rd.avgPrice):'—'}</span></div>
      <div class="d-stat"><span class="d-stat-label">Last sale</span><span class="d-stat-val">${rd?.lastSalePrice?'$'+Math.round(rd.lastSalePrice):'—'}</span></div>
    </div>
    <div class="d-section"><div class="d-section-title">Recent sales (${listings.length})</div>${listingsHtml}</div>`;
}

// ── Results ───────────────────────────────────────────────────────────────────
function showResults(pulls,cfg){
  const tv=pulls.reduce((s,p)=>s+p.price,0);
  const profit=tv-cfg.casePrice;const roi=(profit/cfg.casePrice*100);
  const best=pulls.reduce((a,b)=>a.price>b.price?a:b);
  const hits=pulls.filter(p=>p.variant!=='Base');
  document.getElementById('result-bar').className='result-bar visible';
  document.getElementById('result-bar').innerHTML=`
    <div><div class="result-label">case value</div><div class="result-big">$${Math.round(tv).toLocaleString()}</div></div>
    <div><div class="result-label">vs retail ($${cfg.casePrice})</div><div class="result-big ${profit>=0?'green':'red'}">${profit>=0?'+':''}$${Math.round(Math.abs(profit)).toLocaleString()}</div></div>
    <div><div class="result-label">ROI</div><div class="result-big ${roi>=0?'green':'red'}">${roi>=0?'+':''}${Math.round(roi)}%</div></div>
    <div class="result-breakdown">
      best: <strong style="color:${VCOL[best.variant]||'var(--text)'}">${best.player} ${best.variant}</strong> · $${Math.round(best.price).toLocaleString()}<br>
      parallels: <strong>${hits.length}</strong>${hits.length===1?' (guaranteed)':hits.length>1?` (+ ${hits.length-1} bonus!)`:''}<br>
      base: <strong>${pulls.length-hits.length}</strong>
    </div>`;
  simHistory.unshift({set:(getSetConfig(activeSet)||{label:activeSet}).label,casePrice:cfg.casePrice,hit:hits.map(h=>h.player+' '+h.variant).join(', ')||'—',hitVariant:hits.length?hits[0].variant:null,totalValue:Math.round(tv),roi:Math.round(roi)});
  renderHistory();
}

function renderHistory(){
  if(!simHistory.length)return;
  document.getElementById('history-section').style.display='block';
  document.getElementById('history-body').innerHTML=simHistory.map((h,i)=>`
    <tr><td>${simHistory.length-i}</td><td>${h.set}</td><td>$${h.casePrice}</td>
    <td class="hit-col" style="color:${h.hitVariant?VCOL[h.hitVariant]||'var(--muted)':'var(--muted2)'}">${h.hit}</td>
    <td>$${h.totalValue.toLocaleString()}</td>
    <td class="${h.roi>=0?'green':'red'}">${h.roi>=0?'+':''}${h.roi}%</td></tr>`).join('');
}

function resetSim(){
  simHistory=[];lastPulls=[];renderEmptyGrid();
  document.getElementById('result-bar').classList.remove('visible');
  document.getElementById('history-section').style.display='none';
  isAnimating=false;document.getElementById('pull-btn').disabled=false;closeDrawer();
}

loadData();
</script>
