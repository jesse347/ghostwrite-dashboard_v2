<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ghostladder · case simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --s1: #0f0f0f;
  --s2: #161616;
  --s3: #1e1e1e;
  --border: #222;
  --accent: #e8ff47;
  --text: #efefef;
  --muted: #666;
  --muted2: #444;
  --mono: 'Space Mono', monospace;
  --display: 'Unbounded', sans-serif;
  --green: #3ddc84;
  --red: #ff4455;
  --orange: #ff9f43;
  --fire: #ff2d2d;
  --chrome: #a8c8ff;
  --gold: #ffd700;
  --emerald: #2ecc71;
  --victory: #e8ff47;
  --base: #555;
  --sp: #c084fc;
  --vides: #ff9f43;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); min-height: 100vh; }
body { color: var(--text); font-family: var(--mono); font-size: 12px; }

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,8,8,0.96); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 32px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-family: var(--display); font-size: 20px;
  letter-spacing: 3px; color: var(--text);
  text-decoration: none; flex-shrink: 0;
}
.logo em { color: var(--accent); font-style: normal; }
.nav { display: flex; gap: 0; align-items: center; height: 56px; }
.nav a {
  font-family: var(--mono), monospace;
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  padding: 0 18px; height: 56px;
  display: flex; align-items: center; gap: 6px;
  transition: color 0.15s;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
}
.nav a:hover { color: var(--text); }
.nav a.active { color: var(--text); border-bottom-color: var(--accent); }
.beta-badge {
  font-size: 7px; letter-spacing: 1px;
  background: var(--accent); color: #000;
  padding: 1px 5px; border-radius: 2px; font-weight: 700;
}
.header-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }

.page { max-width: 1100px; margin: 0 auto; padding: 32px; }
.page-header { margin-bottom: 28px; }
.page-title { font-family: var(--display); font-size: 28px; font-weight: 900; letter-spacing: -1px; margin-bottom: 6px; }
.page-title em { color: var(--accent); font-style: normal; }
.page-sub { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

.set-selector { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
.set-btn {
  font-family: var(--display); font-size: 9px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 8px 16px; cursor: pointer;
  background: var(--s2); border: 1px solid var(--border);
  color: var(--muted); transition: all 0.15s;
}
.set-btn:hover { color: var(--text); border-color: var(--muted2); }
.set-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
.stat-card { background: var(--s1); border: 1px solid var(--border); padding: 18px 20px; }
.stat-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.stat-value { font-family: var(--display); font-size: 24px; font-weight: 700; letter-spacing: -1px; }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.accent { color: var(--accent); }
.stat-sub { font-size: 9px; color: var(--muted); margin-top: 4px; }

.sim-area { background: var(--s1); border: 1px solid var(--border); padding: 24px; }
.sim-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.sim-title { font-family: var(--display); font-size: 13px; font-weight: 700; letter-spacing: 1px; }
.sim-controls { display: flex; gap: 8px; align-items: center; }

.pull-btn {
  font-family: var(--display); font-size: 11px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 10px 24px; cursor: pointer;
  background: var(--accent); color: #000; border: none; transition: all 0.15s;
}
.pull-btn:hover { background: #fff; }
.pull-btn:disabled { background: var(--s3); color: var(--muted); cursor: not-allowed; }

.reset-btn {
  font-family: var(--mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
  padding: 10px 16px; cursor: pointer;
  background: transparent; color: var(--muted); border: 1px solid var(--border); transition: all 0.15s;
}
.reset-btn:hover { color: var(--text); border-color: var(--muted2); }

.case-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 20px; }

.box-slot {
  aspect-ratio: 1;
  background: var(--s2); border: 1px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 8px; position: relative;
  transition: border-color 0.2s, background 0.2s;
  cursor: default;
}
.box-slot.populated { animation: reveal 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; }
.box-slot.is-hit { cursor: pointer; }
.box-slot.is-hit:hover { filter: brightness(1.12); }

.box-slot.revealed { animation: reveal 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards; }
@keyframes reveal {
  0%   { transform: scale(0.8) rotateY(90deg); opacity: 0; }
  60%  { transform: scale(1.05); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

.box-slot.is-fire    { border-color: var(--fire);    background: rgba(255,45,45,0.07); }
.box-slot.is-chrome  { border-color: var(--chrome);  background: rgba(168,200,255,0.05); }
.box-slot.is-gold    { border-color: var(--gold);    background: rgba(255,215,0,0.06); }
.box-slot.is-emerald { border-color: var(--emerald); background: rgba(46,204,113,0.05); }
.box-slot.is-victory { border-color: var(--victory); background: rgba(232,255,71,0.04); }
.box-slot.is-sp      { border-color: var(--sp);      background: rgba(192,132,252,0.05); }
.box-slot.is-vides   { border-color: var(--vides);   background: rgba(255,159,67,0.05); }

.box-slot.guaranteed-slot:not(.revealed) { border-color: var(--muted2); border-style: dashed; }

.box-num { position: absolute; top: 5px; left: 7px; font-size: 7px; color: var(--muted2); letter-spacing: 1px; }
.box-empty-icon { font-size: 18px; opacity: 0.12; }

.box-variant-badge {
  font-family: var(--display); font-size: 7px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 2px 5px; margin-bottom: 4px;
}
.box-player {
  font-size: 7px; color: var(--text); text-align: center;
  line-height: 1.3; max-width: 100%;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.box-price { font-family: var(--display); font-size: 12px; font-weight: 700; margin-top: 3px; }
.box-price.estimated { color: var(--muted); }

.box-est-badge {
  position: absolute; top: 4px; right: 4px;
  font-size: 6px; font-family: var(--display); font-weight: 700;
  letter-spacing: 0.5px; padding: 1px 4px;
  color: var(--accent); background: rgba(232,255,71,0.12);
  border: 1px solid rgba(232,255,71,0.3);
}
.box-click-hint {
  position: absolute; bottom: 4px; right: 5px;
  font-size: 6px; color: var(--muted2); opacity: 0; transition: opacity 0.15s;
}
.box-slot.is-hit:hover .box-click-hint { opacity: 1; }

.result-bar { display: none; border-top: 1px solid var(--border); padding-top: 20px; align-items: center; gap: 32px; flex-wrap: wrap; }
.result-bar.visible { display: flex; }
.result-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.result-big { font-family: var(--display); font-size: 28px; font-weight: 700; letter-spacing: -1px; }
.result-big.green { color: var(--green); }
.result-big.red { color: var(--red); }
.result-breakdown { margin-left: auto; font-size: 9px; color: var(--muted); line-height: 1.8; text-align: right; }

.prob-row { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
.prob-title { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.prob-bars { display: flex; flex-direction: column; gap: 6px; }
.prob-item { display: flex; align-items: center; gap: 10px; }
.prob-variant { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; width: 64px; text-align: right; flex-shrink: 0; }
.prob-bar-wrap { flex: 1; background: var(--s3); height: 3px; }
.prob-bar { height: 100%; transition: width 0.5s ease; }
.prob-pct { font-size: 9px; color: var(--muted); width: 60px; flex-shrink: 0; }
.prob-odds { font-size: 8px; color: var(--muted2); flex-shrink: 0; }

.history-section { margin-top: 28px; }
.history-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
.history-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.history-table { width: 100%; border-collapse: collapse; }
.history-table th { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); }
.history-table td { font-size: 10px; padding: 8px 10px; border-bottom: 1px solid rgba(34,34,34,0.5); color: var(--muted); }
.history-table td:first-child { color: var(--muted2); font-size: 9px; }
.history-table td.hit-col { font-weight: 700; }
.history-table td.green { color: var(--green); }
.history-table td.red { color: var(--red); }

.loading-state { padding: 60px; text-align: center; color: var(--muted); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
.loading-dot { display: inline-block; animation: blink 1.2s infinite; }
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }

/* ── Overlay + Drawer ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.overlay.visible { opacity: 1; pointer-events: all; }
.drawer {
  position: fixed; right: 0; top: 0; bottom: 0; width: 390px;
  background: var(--s1); border-left: 1px solid var(--border);
  z-index: 100; transform: translateX(100%); transition: transform 0.25s ease;
  overflow-y: auto; padding: 28px;
}
.drawer.open { transform: translateX(0); }
.drawer-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px 8px; }
.drawer-close:hover { color: var(--text); }
.d-player { font-family: var(--display); font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.d-variant { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; }

.d-section { margin-bottom: 20px; }
.d-section-title { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.d-stat { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.d-stat-label { font-size: 9px; color: var(--muted); }
.d-stat-val { font-size: 11px; color: var(--text); }
.d-stat-val.accent { color: var(--accent); font-family: var(--display); }

.proj-final { background: rgba(232,255,71,0.06); border: 1px solid rgba(232,255,71,0.25); padding: 16px; text-align: center; }
.proj-final-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
.proj-final-val { font-family: var(--display); font-size: 30px; font-weight: 700; color: var(--accent); }
.proj-final-note { font-size: 9px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
.ai-override-note { background: rgba(176,240,255,0.06); border: 1px solid rgba(176,240,255,0.2); padding: 10px 12px; margin-top: 10px; font-size: 9px; color: #b0f0ff; line-height: 1.5; }
.ai-override-note strong { display: block; margin-bottom: 4px; font-size: 8px; letter-spacing: 1px; text-transform: uppercase; }

.sales-hero { background: rgba(232,255,71,0.06); border: 1px solid rgba(232,255,71,0.25); padding: 16px; text-align: center; margin-bottom: 20px; }
.sales-hero-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
.sales-hero-val { font-family: var(--display); font-size: 30px; font-weight: 700; color: var(--accent); }
.sales-hero-sub { font-size: 9px; color: var(--muted); margin-top: 6px; }

.listing-card { display: flex; gap: 10px; align-items: flex-start; padding: 10px; margin-bottom: 6px; background: var(--s2); border: 1px solid var(--border); }
.listing-img { width: 44px; height: 44px; object-fit: cover; flex-shrink: 0; background: var(--s3); }
.listing-img-ph { width: 44px; height: 44px; flex-shrink: 0; background: var(--s3); display: flex; align-items: center; justify-content: center; font-size: 18px; opacity: 0.3; }
.listing-body { flex: 1; min-width: 0; }
.listing-title { font-size: 9px; color: var(--muted); line-height: 1.4; margin-bottom: 4px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.listing-meta { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
.listing-price { font-family: var(--display); font-size: 14px; font-weight: 700; color: var(--accent); }
.listing-date { font-size: 9px; color: var(--muted2); }
.listing-link { font-size: 8px; color: var(--muted); text-decoration: none; }
.listing-link:hover { color: var(--text); }
.afa-badge { font-size: 8px; color: #ffd700; }
.no-listings { font-size: 9px; color: var(--muted2); letter-spacing: 1px; padding: 16px 0; text-align: center; }

.hit-tooltip {
  position: fixed; z-index: 300;
  background: var(--s1); border: 1px solid var(--border);
  padding: 14px 16px; max-width: 300px; font-size: 9px;
  color: var(--muted); line-height: 1.8; letter-spacing: 0.3px;
  display: none; pointer-events: none;
}
.hit-tooltip strong { color: var(--text); display: block; margin-bottom: 6px; font-size: 10px; letter-spacing: 1px; }
.hit-tooltip .formula { font-family: var(--mono); color: var(--accent); font-size: 8px; margin: 6px 0; line-height: 1.6; background: var(--s2); padding: 6px 8px; }
.hit-tooltip .divider { border-top: 1px solid var(--border); margin: 8px 0; }
@media (max-width: 700px) {
  .page { padding: 16px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .case-grid { grid-template-columns: repeat(4, 1fr); }
  .nav { padding: 12px 16px; }
  .drawer { width: 100%; }
}

/* ── Distribution chart (500-case mode) ─────────────────────────────────── */
.dist-svg { width: 100%; overflow: visible; display: block; }
.chart-area { padding: 28px 24px 20px; position: relative; min-height: 280px; }
.chart-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 220px; gap: 12px;
}
.chart-empty-icon { font-size: 32px; opacity: 0.08; }
.chart-empty-text { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.chart-legend {
  display: flex; gap: 20px; padding: 0 24px 20px; flex-wrap: wrap; align-items: center;
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 8px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.legend-swatch { width: 10px; height: 10px; border-radius: 1px; flex-shrink: 0; }
.legend-divider { width: 1px; height: 14px; background: var(--muted2); }
.sim-summary {
  border-top: 1px solid var(--border); padding: 16px 24px;
  display: none; align-items: center; gap: 32px; flex-wrap: wrap;
}
.sim-summary.visible { display: flex; }
.sim-sum-label { font-size: 7px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.sim-sum-val { font-family: var(--display); font-size: 20px; font-weight: 700; }
.sim-sum-val.green { color: var(--green); }
.sim-sum-val.red   { color: var(--red); }
.sim-sum-note { font-size: 8px; color: var(--muted); margin-left: auto; line-height: 1.7; text-align: right; }
/* Bin colors */
:root {
  --bin-real:  #e8ff47;
  --bin-mixed: #ffb347;
  --bin-est:   #7c6fff;
}
.chart-tooltip {
  position: fixed; pointer-events: none; z-index: 200;
  background: var(--s2); border: 1px solid var(--border);
  padding: 10px 14px; min-width: 160px;
  opacity: 0; transition: opacity 0.1s;
}
.chart-tooltip.visible { opacity: 1; }
.tt-val { font-family: var(--display); font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
.tt-row { font-size: 8px; color: var(--muted); margin-bottom: 2px; letter-spacing: 0.5px; }
.tt-row span { color: var(--text); }
/* Two-button sim controls */
.sim-btn-open {
  font-family: var(--display); font-size: 11px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 10px 22px; cursor: pointer;
  background: var(--accent); color: #000; border: none; transition: all 0.15s;
}
.sim-btn-open:hover { background: #fff; }
.sim-btn-open:disabled { background: var(--s3); color: var(--muted); cursor: not-allowed; }
.sim-btn-500 {
  font-family: var(--display); font-size: 11px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 10px 22px; cursor: pointer;
  background: transparent; color: var(--accent);
  border: 1px solid var(--accent); transition: all 0.15s;
}
.sim-btn-500:hover { background: rgba(232,255,71,0.1); }
.sim-btn-500:disabled { border-color: var(--muted2); color: var(--muted); cursor: not-allowed; }
</style>
</head>

<header>
  <div class="logo">ghost<em>ladder</em></div>
  <nav class="nav">
    <a href="index.html">SALES INTEL</a>
    <a href="listings.html">LISTINGS INTEL</a>
    <a href="guide.html">PRICE GUIDE</a>

  </div>

    <div class="loading-state">

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

</div>

<script>
const SB_URL = 'https://sabzbyuqrondoayhwoth.supabase.co';
const SB_KEY = 'sb_publishable_KAbUO5YvOapq_kWkHqt7BA_UTwrP60s';
const SB_H = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

async function rpc(fn, p={}) {
  const r = await fetch(`${SB_URL}/rest/v1/rpc/${fn}`, {method:'POST',headers:SB_H,body:JSON.stringify(p)});
  if (!r.ok) throw new Error(`${fn}: ${r.status}`);
  return r.json();
}
async function sbGet(table, qs) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${qs}`, {headers:SB_H});
  if (!r.ok) throw new Error(`${table}: ${r.status}`);
  return r.json();
}
// Parse a date string in local time (avoids UTC midnight rollback)
// Handles both YYYY-MM-DD and full ISO timestamps from Supabase
function parseDate(str) {
  if (!str) return null;
  // Strip any time component — take only the YYYY-MM-DD part
  const datePart = String(str).substring(0, 10);
  // Append local midnight so JS treats it as local time, not UTC
  const d = new Date(datePart + 'T00:00:00');
  return isNaN(d.getTime()) ? null : d;
}

const SET_CONFIG = [
  { match: ['nba', 'game face', '2024'],  casePrice: 500, casePack: 12, hitRatio: 1.02, label: 'NBA 2024–25'  },
  { match: ['wnba', 'game face', '2024'], casePrice: 500, casePack: 12, hitRatio: 1.02, label: 'WNBA 2024'    },
  { match: ['mlb', 'game face', '2025'],  casePrice: 425, casePack: 12, hitRatio: 1.02, label: 'MLB 2025'     },
];

function getSetConfig(setName) {
  if (allData && allData.sbSetConfig && allData.sbSetConfig[setName]) {
    return allData.sbSetConfig[setName];
  }
  const lower = (setName || '').toLowerCase();
  const ordered = [...SET_CONFIG].sort((a, b) => b.match.join('').length - a.match.join('').length);
  for (const cfg of ordered) {
    if (cfg.match.every(kw => lower.includes(kw))) return cfg;
  }
  return null;
}

const VARIANT_ORDER = ['Base','Victory','Vides','Emerald','Gold','Chrome','Fire','SP'];
const VARIANT_COLORS = {

// ── Load ─────────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const [pi, recentSales, setsData, setMathData] = await Promise.all([
      rpc('get_price_intelligence'),
      rpc('get_recent_sales', {limit_rows: 500}),
      sbGet('sets', 'select=id,name,case_price,figures_per_case,active&active=eq.true'),
      sbGet('set_math', 'select=set_id,player,variant,population'),
    ]);
    const products = pi.filter(r => r.player && r.player !== 'Unknown').map(r => ({
      set: r.set_name, player: r.player, variant: r.variant,
      totalSales: +r.total_sales || 0, avgPrice: +r.avg_price || 0,
      avg30d: +r.avg_30d || 0, sales30d: +r.sales_30d || 0,
      avg90d: +r.avg_90d || 0, sales90d: +r.sales_90d || 0,
      lastSaleDate: r.last_sale_date, lastSalePrice: +r.last_sale_price || 0,
    }));
    const allListings = recentSales.filter(r => r.player && r.player !== 'Unknown').map(r => ({
      set: r.set_name, player: r.player, variant: r.variant,
      price: +r.price || 0, date: r.date, image: r.image_url,
      url: r.ebay_url, afa: r.afa_grade, title: '',
    }));
    // Build set_id -> name lookup
    const setIdToName = {};
    setsData.forEach(s => { setIdToName[s.id] = s.name; });
    // Build set config from Supabase
    const sbSetConfig = {};
    setsData.forEach(s => {
      sbSetConfig[s.name] = { casePrice: +s.case_price || 500, casePack: +s.figures_per_case || 12 };
    });
    // Build set_math: set_name -> [{player, variant, population}]
    const setMath = {};
    setMathData.forEach(row => {
      const setName = setIdToName[row.set_id];
      if (!setName) return;
      if (!setMath[setName]) setMath[setName] = [];
      setMath[setName].push({ player: row.player, variant: row.variant, population: +row.population });
    });
    allData = { products, allListings, aiModelOutput: null, sbSetConfig, setMath };
    initPage();
  } catch(e) {
    document.getElementById('main-content').innerHTML =
      `<div class="loading-state" style="color:#ff4455">failed to load: ${e.message}</div>`;
  }
}

function initPage() {
  const setsWithMath = Object.keys(allData.setMath || {});
  const setsWithPI   = [...new Set((allData.products||[])
    .filter(p => p.player && p.player !== 'Unknown' && p.set).map(p => p.set))];
  const availableSets = setsWithMath.filter(s =>
    setsWithPI.includes(s) || (allData.sbSetConfig && allData.sbSetConfig[s])
  );

function renderStats() {
  const cfg = getSetConfig(activeSet) || { casePrice:500, casePack:12, hitRatio:1.02 };
  const products = (allData.products||[]).filter(p => p.set===activeSet && p.player && p.player!=='Unknown');

  const basePrices = products.filter(p => p.variant==='Base' && p.avgPrice>0).map(p => p.avgPrice);
  const avgBase = basePrices.length ? Math.round(basePrices.reduce((a,b)=>a+b,0)/basePrices.length) : 0;

  // Avg hit value — two versions using set_math as population source
  const { projections } = buildProjections(activeSet, products);
  const mathRows = (allData.setMath && allData.setMath[activeSet]) || [];
  const nonBaseMath = mathRows.filter(r => r.variant !== 'Base' && r.population > 0);
  let realGMV = 0, realPop = 0, fullGMV = 0, fullPop = 0;
  nonBaseMath.forEach(({ player, variant, population }) => {
    const pi = products.find(p => p.player===player && p.variant===variant);
    const realPrice = (pi && pi.avgPrice>0) ? pi.avgPrice : null;
    if (realPrice) { realGMV += population * realPrice; realPop += population; }
    const proj = projections[player+'|||'+variant];
    const usePrice = realPrice || (proj && proj.price>0 ? proj.price : null);
    if (usePrice) { fullGMV += population * usePrice; fullPop += population; }
  });
  const avgHitReal = realPop>0 ? Math.round(realGMV/realPop) : 0;
  const avgHitFull = fullPop>0 ? Math.round(fullGMV/fullPop) : 0;
  const hitRealCombos = nonBaseMath.filter(({player,variant}) =>
    products.find(p => p.player===player && p.variant===variant && p.avgPrice>0)
  ).length;
  const hitTotalCombos = nonBaseMath.length;

  // Expected value using guaranteed-hit pool math
  const { hitPool, fullPool } = buildSplitPools(activeSet);
  let expectedValue = 0;
  if (hitPool.length && fullPool.length) {
    const hitAvg = hitPool.reduce((s,f)=>s+f.price,0)/hitPool.length;
    const fullAvg = fullPool.reduce((s,f)=>s+f.price,0)/fullPool.length;
    expectedValue = Math.round(hitAvg + fullAvg*(cfg.casePack-1));
  }
  const avgRoi = expectedValue>0 ? Math.round(((expectedValue-cfg.casePrice)/cfg.casePrice)*100) : 0;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">case retail</div>
      <div class="stat-value">$${cfg.casePrice}</div>
      <div class="stat-sub">${cfg.casePack} figures · 1 guaranteed hit</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">avg base value</div>
      <div class="stat-value accent">$${avgBase||'—'}</div>
      <div class="stat-sub">${basePrices.length} players w/ data</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">avg hit value
        <span style="font-size:8px;color:var(--muted);cursor:default;user-select:none" onmouseenter="showHitTooltip(event)" onmouseleave="hideHitTooltip()"> ⓘ</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
        <div>
          <div class="stat-value" style="color:var(--gold)">${avgHitReal ? '$'+avgHitReal.toLocaleString() : '—'}</div>
          <div class="stat-sub">real · ${hitRealCombos} combos</div>
        </div>
        <div style="color:var(--muted);font-size:16px;align-self:center">/</div>
        <div>
          <div class="stat-value" style="color:var(--orange);font-size:18px">${avgHitFull ? '$'+avgHitFull.toLocaleString() : '—'}</div>
          <div class="stat-sub">+proj · ${hitTotalCombos} combos</div>

// ═══════════════════════════════════════════════════════════════════════════
// POOL BUILDER
// ═══════════════════════════════════════════════════════════════════════════

function buildSplitPools(setName) {
  const { pool } = buildPool(setName);
  const cfg = getSetConfig(setName) || { casePack: 12 };

  const hitPool  = pool.filter(f => f.variant !== 'Base');
  const basePool = pool.filter(f => f.variant === 'Base');

  // Total cases = total population / figures per case
  const totalCases = Math.round(pool.length / cfg.casePack);

  // One parallel is guaranteed per case, so the parallels left floating
  // in the remaining 11 slots = totalParallels - totalCases
  const remainingParallelCount = Math.max(0, hitPool.length - totalCases);

  // Shuffle so truncation is random across variants, not always the same ones
  const shuffledHitPool = [...hitPool].sort(() => Math.random() - 0.5);
  const remainingParallels = shuffledHitPool.slice(0, remainingParallelCount);

  // remainingPool = all base cards + leftover parallels
  const remainingPool = [...basePool, ...remainingParallels];

  return { hitPool, fullPool: pool, remainingPool, totalCases };
}

function buildPool(setName) {
  const products = (allData.products||[]).filter(p => p.set===setName && p.player && p.player!=='Unknown');
  const { projections } = buildProjections(setName, products);
  const pool = []; const poolByVariant = {};
  // Use set_math as sole source of truth for roster + populations
  const mathRows = (allData.setMath && allData.setMath[setName]) || [];
  if (!mathRows.length) {
    console.warn('No set_math data for', setName);
    return { pool, poolByVariant, totalPop: 0 };
  }
  mathRows.forEach(({ player, variant, population }) => {
    if (!player || player === 'Unknown' || !population) return;
    const price = getPrice(player, variant, products, projections); if (!price) return;
    for (let i=0; i<population; i++) {
      pool.push({ player, variant, price: price.value,
        isEstimated: price.estimated, confidence: price.confidence,
        projData: price.projData||null, realData: price.realData||null });
    }
    poolByVariant[variant] = (poolByVariant[variant]||0)+population;
  });
  return { pool, poolByVariant, totalPop: pool.length };
}

function getPrice(player, variant, products, projections) {
  const real = products.find(p => p.player===player && p.variant===variant);
  if (real) { const p=bestPriceSim(real); if (p) return {value:p,estimated:false,confidence:'real',realData:real}; }
  const proj = projections[player+'|||'+variant];
  if (proj && proj.price>0) return {value:proj.price,estimated:true,confidence:proj.confidence,projData:proj};
  const vp = products.filter(p=>p.variant===variant&&p.avgPrice>0).map(p=>p.avgPrice);
  if (vp.length) return {value:Math.round(vp.reduce((a,b)=>a+b,0)/vp.length),estimated:true,confidence:'set-avg'};
  return null;
}

function bestPriceSim(p) {
  if (!p) return null;
  if (p.avg30d  && p.sales30d  >= 1) return p.avg30d;
  if (p.avg90d  && p.sales90d  >= 1) return p.avg90d;
  if (p.avgPrice && p.totalSales >= 1) return p.avgPrice;
  return null;
}

// ═══════════════════════════════════════════════════════════════════════════
// PROJECTION ENGINE (full, with anchors for drawer)
// ═══════════════════════════════════════════════════════════════════════════

function buildProjections(setName, setProducts) {
  const aiMults = {}, aiOverrides = {};
  if (allData.aiModelOutput) {
    (allData.aiModelOutput.adjustedMultipliers||[]).filter(m=>m.set===setName)
      .forEach(m => { aiMults[m.variant] = {mult:m.recommendedMultiplier,reasoning:m.reasoning}; });
    (allData.aiModelOutput.playerOverrides||[]).filter(o=>o.set===setName)
      .forEach(o => { aiOverrides[o.player+'|||'+o.variant] = o; });
  }

  const byPlayer = {};
  setProducts.forEach(p => { if (!byPlayer[p.player]) byPlayer[p.player]={}; byPlayer[p.player][p.variant]=p; });

  const mathRows = (allData.setMath && allData.setMath[setName]) || [];
  const allVariants = mathRows.length
    ? [...new Set(mathRows.map(r=>r.variant))]
    : [...new Set(setProducts.map(p=>p.variant))];
  const crossRatios = {};
  allVariants.forEach(vA => allVariants.forEach(vB => {
    if (vA===vB) return;
    crossRatios[vA+'|||'+vB] = [];
    Object.values(byPlayer).forEach(pv => {
      const dA = bestPriceFull(pv[vA]), dB = bestPriceFull(pv[vB]);
      if (dA && dB && dA.price>0 && dB.price>0)
        crossRatios[vA+'|||'+vB].push({ratio:dA.price/dB.price,salesA:dA.sales,salesB:dB.sales});
    });
  }));

  function weightedMedianRatio(pairs) {
    if (!pairs.length) return null;
    const s = [...pairs].sort((a,b)=>a.ratio-b.ratio);
    const tw = s.reduce((t,p)=>t+Math.min(p.salesA||1,p.salesB||1),0);
    let cw=0;
    for (const p of s) { cw+=Math.min(p.salesA||1,p.salesB||1); if (cw>=tw/2) return {ratio:p.ratio,n:pairs.length}; }
    return {ratio:s[Math.floor(s.length/2)].ratio,n:pairs.length};
  }

  const setRatios = {};
  Object.entries(crossRatios).forEach(([k,p]) => { const r=weightedMedianRatio(p); if(r) setRatios[k]=r; });

  const projections = {};
  Object.entries(byPlayer).forEach(([player,variants]) => {
    const known = Object.keys(variants).filter(v=>variants[v]?.avgPrice>0);
    if (!known.length) return;
    allVariants.forEach(tv => {
      if (variants[tv]?.avgPrice>0) return;
      if (!setProducts.some(p=>p.variant===tv)) return;
      const ov = aiOverrides[player+'|||'+tv];
      const am = aiMults[tv];
      const anchors = [];
      known.forEach(sv => {
        const rd = setRatios[tv+'|||'+sv]; if (!rd) return;
        const sp = bestPriceFull(variants[sv]); if (!sp) return;
        const prox = (VARIANT_PROXIMITY[tv]||{})[sv]||0.5;
        const rf = sp.recency==='30d'?1.0:sp.recency==='90d'?0.7:0.4;
        anchors.push({
          sourceVariant:sv, sourcePrice:Math.round(sp.price), sourceRecency:sp.recency,
          sourceSales:sp.sales, ratio:Math.round(rd.ratio*100)/100, ratioN:rd.n,
          impliedPrice:Math.round(sp.price*rd.ratio), proximity:prox, recencyFactor:rf,
          weight:prox*rf*Math.sqrt(sp.sales),
        });
      });
      if (!anchors.length && !ov) return;
      let pp, pt;
      if (ov) {
        pp = Math.round(ov.overrideMultiplier*(bestPriceFull(variants['Base'])?.price||1)); pt='ai';
      } else {
        const tw=anchors.reduce((s,a)=>s+a.weight,0);
        pp = tw>0 ? Math.round(anchors.reduce((s,a)=>s+a.impliedPrice*a.weight,0)/tw) : Math.round(anchors[0].impliedPrice);
        pt = am?'ai':'est';
      }
      const h30=anchors.some(a=>a.sourceRecency==='30d'), h90=anchors.some(a=>a.sourceRecency==='90d');
      const hp=anchors.filter(a=>a.proximity>=0.8).length;
      let conf,cs;
      if (anchors.length>=3&&h30&&hp>=2)          {conf='High';cs=90;}
      else if (anchors.length>=2&&(h30||h90))      {conf='Medium';cs=65;}
      else if (anchors.length>=2)                  {conf='Medium-Low';cs=45;}
      else if (anchors.length===1&&anchors[0].sourceSales>=10) {conf='Low';cs=30;}
      else                                         {conf='Very Low';cs=15;}
      if (ov||am) {conf='AI Calibrated';cs=Math.min(95,cs+20);}
      projections[player+'|||'+tv] = {
        price:pp, projType:pt, confidence:conf, confidenceScore:cs,
        anchors, aiOverride:ov||null, aiAdjusted:am||null,
        playerBasePrice:Math.round(bestPriceFull(variants['Base'])?.price||0),
      };
    });
  });
  return { projections, byPlayer };
}

function bestPriceFull(p) {
  if (!p) return null;
  if (p.avg30d  && p.sales30d  >= 1) return {price:p.avg30d,  recency:'30d',      sales:p.sales30d};
  if (p.avg90d  && p.sales90d  >= 1) return {price:p.avg90d,  recency:'90d',      sales:p.sales90d};
  if (p.avgPrice && p.totalSales >= 1) return {price:p.avgPrice,recency:'all-time',sales:p.totalSales};
  return null;
}

function runSimulation() {
  if (isAnimating) return;
  isAnimating = true;
  showSingleCaseMode();
  document.getElementById('prob-row').style.display = 'none';
  const b1 = document.getElementById('btn-one'), b5 = document.getElementById('btn-500');
  if(b1) b1.disabled = true;
  if(b5) b5.disabled = true;

  const cfg = getSetConfig(activeSet)||{casePrice:500,casePack:12,hitRatio:1.02};
  const { hitPool, remainingPool } = buildSplitPools(activeSet);

  if (!hitPool.length) {
    alert('Not enough parallel data to simulate this set yet.');
    isAnimating = false;
    enableBtns();
    return;
  }

  const pulls = [];
  pulls.push({ ...hitPool[Math.floor(Math.random()*hitPool.length)], slotIndex:0, isGuaranteed:true });
  for (let i=1; i<cfg.casePack; i++) {
    pulls.push({ ...remainingPool[Math.floor(Math.random()*remainingPool.length)], slotIndex:i, isGuaranteed:false });
  }

  lastPulls = pulls;

  pulls.forEach((pull, i) => {
    setTimeout(() => {
      revealSlot(i, pull);
      if (i===cfg.casePack-1) {
        setTimeout(() => {
          showResults(pulls, cfg);
          isAnimating = false;
          enableBtns();
        }, 300);
      }
    }, i*110);
  });
}

function revealSlot(i, pull) {
  const slot = document.getElementById('slot-'+i);
  const vLow = pull.variant.toLowerCase();
  const isHit = pull.variant !== 'Base';

  const estBadge = (isHit && pull.isEstimated)
    ? `<span class="box-est-badge">EST</span>` : '';
  const clickHint = isHit ? `<span class="box-click-hint">↗ details</span>` : '';

  slot.className = `box-slot revealed${isHit?' is-hit is-'+vLow:''}${pull.isGuaranteed?' guaranteed-slot':''}`;
  if (isHit) slot.setAttribute('onclick', `openHitDrawer(${i})`);

  slot.innerHTML = `
    <span class="box-num">${i+1}${pull.isGuaranteed?' ★':''}</span>
    ${estBadge}
    <span class="box-variant-badge" style="color:${VARIANT_COLORS[pull.variant]||'var(--muted)'}">
      ${pull.variant}

}

// ── Log-normal price sampler ───────────────────────────────────────────────
function samplePrice(centralPrice, cv) {
  if (cv <= 0) return centralPrice;
  const sigma2 = Math.log(1 + cv*cv);
  const sigma  = Math.sqrt(sigma2);
  const mu     = Math.log(centralPrice) - sigma2/2;
  const u1 = Math.random(), u2 = Math.random();
  const z  = Math.sqrt(-2*Math.log(u1)) * Math.cos(2*Math.PI*u2);
  return Math.max(centralPrice * 0.2, Math.round(Math.exp(mu + sigma*z)));
}

// ── Simulate one case with price sampling ─────────────────────────────────
function simulateOneCase500(setName) {
  const cfg = getSetConfig(setName) || { casePack: 12 };
  const { hitPool, remainingPool } = buildSplitPools(setName);
  if (!hitPool.length) return null;
  const pulls = [];
  const hitTpl = hitPool[Math.floor(Math.random()*hitPool.length)];
  const hitCv  = CONF_CV[hitTpl.isEstimated ? (hitTpl.confidence||'set-avg') : 'real'];
  pulls.push({ ...hitTpl, drawnPrice: samplePrice(hitTpl.price, hitCv), slotIndex:0, isGuaranteed:true });
  for (let i=1; i<cfg.casePack; i++) {
    const t  = remainingPool[Math.floor(Math.random()*remainingPool.length)];
    const cv = CONF_CV[t.isEstimated ? (t.confidence||'set-avg') : 'real'];
    pulls.push({ ...t, drawnPrice: samplePrice(t.price, cv), slotIndex:i, isGuaranteed:false });
  }
  const totalValue  = Math.round(pulls.reduce((s,p)=>s+p.drawnPrice,0));
  const estFraction = pulls.filter(p=>p.isEstimated).length / pulls.length;
  return { totalValue, pulls, estFraction };
}

// ── Distribution chart ─────────────────────────────────────────────────────
function renderDistribution() {
  const cfg = getSetConfig(activeSet) || { casePrice: 500 };
  const values = simResults.map(r => r.totalValue);
  const sorted = [...values].sort((a,b)=>a-b);
  const TAIL_PCT = 0.95;
  const tailCutoff = sorted[Math.floor(sorted.length * TAIL_PCT)];
  const mainValues = values.filter(v => v <= tailCutoff);
  const tailSims   = simResults.filter(r => r.totalValue > tailCutoff);
  const binMin = Math.floor(Math.min(...mainValues)/BIN_SIZE)*BIN_SIZE;
  const binMax = Math.ceil(tailCutoff/BIN_SIZE)*BIN_SIZE;
  const numBins = Math.ceil((binMax-binMin)/BIN_SIZE);
  const bins = Array.from({length:numBins},(_,i)=>({lo:binMin+i*BIN_SIZE,hi:binMin+(i+1)*BIN_SIZE,sims:[],count:0,estSum:0}));
  simResults.forEach(r => {
    if (r.totalValue > tailCutoff) return;
    const idx = Math.min(Math.floor((r.totalValue-binMin)/BIN_SIZE),numBins-1);
    if (idx>=0&&idx<bins.length){bins[idx].sims.push(r);bins[idx].count++;bins[idx].estSum+=r.estFraction;}
  });
  const p10=sorted[Math.floor(sorted.length*0.10)],p50=sorted[Math.floor(sorted.length*0.50)],p90=sorted[Math.floor(sorted.length*0.90)];
  const mean=Math.round(values.reduce((a,b)=>a+b,0)/values.length);
  const pctAbove=Math.round(values.filter(v=>v>=cfg.casePrice).length/values.length*100);
  const maxCount=Math.max(...bins.map(b=>b.count),tailSims.length);
  const W=940,H=200,PAD={top:16,right:80,bottom:36,left:48};
  const chartW=W-PAD.left-PAD.right,chartH=H-PAD.top-PAD.bottom;
  const mainW=chartW*0.82,gapW=chartW*0.04,overflowW=chartW*0.10;
  const overflowX=PAD.left+mainW+gapW;
  const barW=mainW/numBins;
  const xPos=val=>PAD.left+(val-binMin)/(binMax-binMin)*mainW;
  const yH=count=>(count/maxCount)*chartH;
  function binColor(b){if(!b.count)return 'transparent';const a=b.estSum/b.count;return a<0.25?'var(--bin-real)':a<0.60?'var(--bin-mixed)':'var(--bin-est)';}
  let barsSvg='';
  bins.forEach((b,i)=>{
    if(!b.count)return;
    const x=PAD.left+i*barW,h=yH(b.count),y=PAD.top+chartH-h;
    const isSel=selectedBin===i,op=selectedBin===null?0.85:(isSel?1.0:0.25);
    barsSvg+=`<rect class="dist-bar" data-bin="${i}" x="${x+1}" y="${y}" width="${Math.max(1,barW-2)}" height="${h}" fill="${binColor(b)}" opacity="${op}" style="cursor:pointer;transition:opacity 0.15s" onmouseenter="barHover(event,${i})" onmouseleave="barLeave()" onclick="selectBin500(${i})"/>`;
  });
  const overflowH=yH(tailSims.length),overflowY=PAD.top+chartH-overflowH;
  if(tailSims.length>0){
    barsSvg+=`<defs><pattern id="jackpot-stripe" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="6" stroke="#e8ff47" stroke-width="2" opacity="0.5"/></pattern></defs>`;
    const isSel=selectedBin==='overflow',op=selectedBin===null?0.75:(isSel?1.0:0.25);
    barsSvg+=`<rect class="dist-bar" data-bin="overflow" x="${overflowX}" y="${overflowY}" width="${overflowW}" height="${overflowH}" fill="url(#jackpot-stripe)" opacity="${op}" style="cursor:pointer;transition:opacity 0.15s" onmouseenter="barHover(event,'overflow')" onmouseleave="barLeave()" onclick="selectBin500('overflow')"/>`;
    barsSvg+=`<rect x="${overflowX}" y="${overflowY}" width="${overflowW}" height="${overflowH}" fill="none" stroke="#e8ff47" stroke-width="1" opacity="0.3"/>`;
    const om=overflowX+overflowW/2;
    barsSvg+=`<text x="${om}" y="${PAD.top+chartH+14}" text-anchor="middle" fill="#555" font-size="7" font-family="Space Mono">jackpot</text>`;
    barsSvg+=`<text x="${om}" y="${PAD.top+chartH+23}" text-anchor="middle" fill="#444" font-size="7" font-family="Space Mono">top 5%</text>`;
    barsSvg+=`<text x="${om}" y="${overflowY-4}" text-anchor="middle" fill="#666" font-size="7" font-family="Space Mono">${tailSims.length}</text>`;
    const bx=PAD.left+mainW+gapW/2;
    barsSvg+=`<path d="M${bx-3},${PAD.top} L${bx+3},${PAD.top+chartH/3} L${bx-3},${PAD.top+chartH*2/3} L${bx+3},${PAD.top+chartH}" stroke="#333" stroke-width="1.5" fill="none"/>`;
  }
  let yAxis='';
  [0,0.25,0.5,0.75,1.0].forEach(t=>{const y=PAD.top+chartH-t*chartH,c=Math.round(t*maxCount);yAxis+=`<line x1="${PAD.left-4}" y1="${y}" x2="${PAD.left}" y2="${y}" stroke="#333" stroke-width="1"/><text x="${PAD.left-8}" y="${y+4}" text-anchor="end" fill="#444" font-size="8" font-family="Space Mono">${c}</text>`;});
  let xAxis='';
  for(let v=Math.ceil(binMin/100)*100;v<=binMax;v+=100){const x=xPos(v);if(x>PAD.left&&x<PAD.left+mainW){xAxis+=`<line x1="${x}" y1="${PAD.top+chartH}" x2="${x}" y2="${PAD.top+chartH+4}" stroke="#333" stroke-width="1"/><text x="${x}" y="${PAD.top+chartH+14}" text-anchor="middle" fill="#444" font-size="8" font-family="Space Mono">$${v}</text>`;}}
  let grid='';[0.25,0.5,0.75,1.0].forEach(t=>{const y=PAD.top+chartH-t*chartH;grid+=`<line x1="${PAD.left}" y1="${y}" x2="${W-PAD.right+60}" y2="${y}" stroke="#171717" stroke-width="1"/>`;});
  const ciX1=Math.max(PAD.left,xPos(p10)),ciX2=Math.min(PAD.left+mainW,xPos(Math.min(p90,tailCutoff)));
  const ci50X1=Math.max(PAD.left,xPos(sorted[Math.floor(sorted.length*0.25)])),ci50X2=Math.min(PAD.left+mainW,xPos(Math.min(sorted[Math.floor(sorted.length*0.75)],tailCutoff)));
  const ciShade=`<rect x="${ciX1}" y="${PAD.top}" width="${ciX2-ciX1}" height="${chartH}" fill="rgba(232,255,71,0.04)"/>`;
  const ci50=`<rect x="${ci50X1}" y="${PAD.top}" width="${ci50X2-ci50X1}" height="${chartH}" fill="rgba(232,255,71,0.05)"/>`;
  function vLine(val,color,label,dashed=false){const x=xPos(val);if(x<PAD.left||x>PAD.left+mainW)return '';const dash=dashed?'stroke-dasharray="4,3"':'';return `<line x1="${x}" y1="${PAD.top}" x2="${x}" y2="${PAD.top+chartH}" stroke="${color}" stroke-width="1" ${dash} opacity="0.7"/><text x="${x+3}" y="${PAD.top+10}" fill="${color}" font-size="7" font-family="Space Mono" opacity="0.85">${label}</text>`;}
  const svg=`<svg class="dist-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${grid}${ciShade}${ci50}${barsSvg}${vLine(cfg.casePrice,'#e8ff47','retail')}${vLine(p10,'rgba(232,255,71,0.4)','p10',true)}${vLine(p50,'rgba(232,255,71,0.6)','med',true)}${vLine(Math.min(p90,tailCutoff),'rgba(232,255,71,0.4)',p90>tailCutoff?'p90+':'p90',true)}${yAxis}${xAxis}<line x1="${PAD.left}" y1="${PAD.top}" x2="${PAD.left}" y2="${PAD.top+chartH}" stroke="#2a2a2a" stroke-width="1"/><line x1="${PAD.left}" y1="${PAD.top+chartH}" x2="${W-PAD.right+60}" y2="${PAD.top+chartH}" stroke="#2a2a2a" stroke-width="1"/></svg>`;
  document.getElementById('chart-area').innerHTML=svg;
  const meanRoi=Math.round((mean-cfg.casePrice)/cfg.casePrice*100);
  const sumEl=document.getElementById('sim-summary');
  sumEl.className='sim-summary visible';
  sumEl.innerHTML=`<div><div class="sim-sum-label">median</div><div class="sim-sum-val ${p50>=cfg.casePrice?'green':'red'}">$${p50.toLocaleString()}</div></div><div><div class="sim-sum-label">mean</div><div class="sim-sum-val ${mean>=cfg.casePrice?'green':'red'}">$${mean.toLocaleString()}</div></div><div><div class="sim-sum-label">p10 – p90</div><div class="sim-sum-val" style="font-size:14px;color:var(--text)">$${p10.toLocaleString()} – $${p90.toLocaleString()}</div></div><div><div class="sim-sum-label">% above retail</div><div class="sim-sum-val ${pctAbove>=50?'green':'red'}">${pctAbove}%</div></div><div class="sim-sum-note">median roi: <strong style="color:${meanRoi>=0?'var(--green)':'var(--red)'}">${meanRoi>=0?'+':''}${meanRoi}%</strong><br>${N_SIMS} sims · $${BIN_SIZE} bins<br>click a bar to inspect that case</div>`;
}

// ── Bin helpers ────────────────────────────────────────────────────────────
function getBins500() {
  if (!simResults.length) return [];
  const values=simResults.map(r=>r.totalValue),sorted=[...values].sort((a,b)=>a-b);
  const tailCutoff=sorted[Math.floor(sorted.length*0.95)];
  const binMin=Math.floor(Math.min(...values)/BIN_SIZE)*BIN_SIZE,binMax=Math.ceil(tailCutoff/BIN_SIZE)*BIN_SIZE;
  const numBins=Math.ceil((binMax-binMin)/BIN_SIZE);
  const bins=Array.from({length:numBins},(_,i)=>({lo:binMin+i*BIN_SIZE,hi:binMin+(i+1)*BIN_SIZE,sims:[],count:0,estSum:0}));
  const overflow={lo:tailCutoff,hi:Infinity,sims:[],count:0,estSum:0,isOverflow:true};
  simResults.forEach(r=>{if(r.totalValue>tailCutoff){overflow.sims.push(r);overflow.count++;overflow.estSum+=r.estFraction;}else{const idx=Math.min(Math.floor((r.totalValue-binMin)/BIN_SIZE),numBins-1);if(idx>=0&&idx<bins.length){bins[idx].sims.push(r);bins[idx].count++;bins[idx].estSum+=r.estFraction;}}});
  bins.push(overflow);
  return bins;
}

function selectBin500(binIdx) {
  let b;
  if (binIdx==='overflow'){const all=getBins500();b=all.find(x=>x.isOverflow);}
  else{b=getBins500()[binIdx];}
  if(!b||!b.count)return;
  selectedBin=binIdx;
  document.querySelectorAll('.dist-bar').forEach(el=>{const idx=el.dataset.bin;el.setAttribute('opacity',String(idx)===String(binIdx)?'1.0':'0.25');});
  const sortedSims=[...b.sims].sort((a,b)=>a.totalValue-b.totalValue);
  const medSim=sortedSims[Math.floor(sortedSims.length/2)];
  activePulls500=medSim.pulls;
  populateCaseGrid500(medSim);
}

function populateCaseGrid500(sim) {
  const cfg=getSetConfig(activeSet)||{casePrice:500};
  const tv=sim.totalValue,roi=Math.round((tv-cfg.casePrice)/cfg.casePrice*100);
  const estCount=sim.pulls.filter(p=>p.isEstimated).length;
  document.getElementById('dist-case-meta').innerHTML=
    `value: <strong style="color:${tv>=cfg.casePrice?'var(--green)':'var(--red)'}">$${tv.toLocaleString()}</strong> · roi: <strong style="color:${roi>=0?'var(--green)':'var(--red)'}">${roi>=0?'+':''}${roi}%</strong> · ${estCount} projected`;
  document.getElementById('dist-case-section').style.display='';
  const grid=document.getElementById('dist-case-grid');
  const cfg2=getSetConfig(activeSet)||{casePack:12};
  // Ensure grid has the right number of slots
  if(grid.children.length!==cfg2.casePack){
    grid.innerHTML='';
    for(let i=0;i<cfg2.casePack;i++){const d=document.createElement('div');d.className='box-slot';d.id='dslot-'+i;grid.appendChild(d);}
  }
  sim.pulls.forEach((pull,i)=>{
    const slot=document.getElementById('dslot-'+i); if(!slot)return;
    const vLow=pull.variant.toLowerCase(),isHit=pull.variant!=='Base';
    const estBadge=(isHit&&pull.isEstimated)?`<span class="box-est-badge">EST</span>`:'';
    slot.className=`box-slot populated${isHit?' is-hit is-'+vLow:''}${pull.isGuaranteed?' guaranteed-slot':''}`;
    slot.style.animationDelay=(i*0.04)+'s';
    if(isHit)slot.setAttribute('onclick',`openHitDrawer500(${i})`);
    else slot.removeAttribute('onclick');
    slot.innerHTML=`<span class="box-num">${i+1}${pull.isGuaranteed?' ★':''}</span>${estBadge}<span class="box-variant-badge" style="color:${VARIANT_COLORS[pull.variant]||'var(--muted)'}">${pull.variant}</span><span class="box-player">${pull.player}</span><span class="box-price${pull.isEstimated?' estimated':''}">$${Math.round(pull.drawnPrice).toLocaleString()}</span>`;
  });
}

function openHitDrawer500(i) {
  if(!activePulls500)return;
  const pull=activePulls500[i];
  if(!pull||pull.variant==='Base')return;
  document.getElementById('d-player').textContent=pull.player;
  document.getElementById('d-variant').textContent=pull.variant+(pull.isEstimated?' · Projected Value':' · Sales History');
  if(pull.isEstimated)renderProjectionBody(pull);
  else renderSalesBody(pull);
  document.getElementById('overlay').classList.add('visible');
  document.getElementById('drawer').classList.add('open');
}

// ── Bar interaction ────────────────────────────────────────────────────────
function barHover(event, binIdx) {
  let b;
  if(binIdx==='overflow'){const all=getBins500();b=all.find(x=>x.isOverflow);}
  else{b=getBins500()[binIdx];}
  if(!b||!b.count)return;
  const cfg=getSetConfig(activeSet)||{casePrice:500};
  const avgEst=b.count>0?b.estSum/b.count:0;
  const quality=avgEst<0.25?'real data':avgEst<0.60?'mixed':'mostly projected';
  const tt=document.getElementById('chart-tooltip');
  if(b.isOverflow){
    const av=Math.round(b.sims.reduce((s,r)=>s+r.totalValue,0)/b.sims.length);
    const ar=Math.round((av-cfg.casePrice)/cfg.casePrice*100);
    document.getElementById('tt-val').textContent='jackpot — top 5%';
    document.getElementById('tt-count').textContent=`${b.count} of ${N_SIMS} (${Math.round(b.count/N_SIMS*100)}%)`;
    document.getElementById('tt-roi').textContent=`avg ${ar>=0?'+':''}${ar}%`;
  } else {
    const mid=(b.lo+b.hi)/2,roi=Math.round((mid-cfg.casePrice)/cfg.casePrice*100);
    document.getElementById('tt-val').textContent=`$${b.lo.toLocaleString()} – $${b.hi.toLocaleString()}`;
    document.getElementById('tt-count').textContent=`${b.count} of ${N_SIMS} (${Math.round(b.count/N_SIMS*100)}%)`;
    document.getElementById('tt-roi').textContent=`${roi>=0?'+':''}${roi}%`;
  }
  document.getElementById('tt-quality').textContent=quality;
  tt.classList.add('visible');
  positionTooltip(event);
}
function barLeave(){document.getElementById('chart-tooltip').classList.remove('visible');}
function positionTooltip(e){const tt=document.getElementById('chart-tooltip');tt.style.left=Math.min(e.clientX+16,window.innerWidth-200)+'px';tt.style.top=Math.max(10,e.clientY-60)+'px';}
document.addEventListener('mousemove',e=>{if(document.getElementById('chart-tooltip').classList.contains('visible'))positionTooltip(e);});

// ── Hit value tooltip ─────────────────────────────────────────────────────────
function showHitTooltip(e) {
  let tt = document.getElementById('hit-tooltip');
  if (!tt) {
    tt = document.createElement('div');
    tt.id = 'hit-tooltip';
    tt.className = 'hit-tooltip';
    tt.innerHTML = `
      <strong>How Avg Hit Value is calculated</strong>
      For each non-Base player/variant combo in Set Math:<br>
      multiply its <em>population</em> by its <em>price</em>,<br>
      sum all products, divide by total non-Base population.
      <div class="formula">
        Σ (population × price)<br>
        ────────────────────────<br>
        Σ (population)
      </div>
      <div class="divider"></div>
      <strong style="font-size:9px">Real data only (gold)</strong>
      Only combos with verified eBay sales. Conservative.
      <div class="divider"></div>
      <strong style="font-size:9px">Incl. projected (orange)</strong>
      Adds estimated prices for combos with no sales yet.<br>
      Covers the full roster but carries more uncertainty.
    `;
    document.body.appendChild(tt);
  }
  tt.style.display = 'block';
  const x = Math.min(e.clientX + 12, window.innerWidth - 320);
  tt.style.left = x + 'px';
  tt.style.top  = (e.clientY + 16) + 'px';
}
function hideHitTooltip() {
  const tt = document.getElementById('hit-tooltip');
  if (tt) tt.style.display = 'none';
}

loadData();
</script>

<div class="chart-tooltip" id="chart-tooltip">
  <div class="tt-val" id="tt-val"></div>
  <div class="tt-row">simulations: <span id="tt-count"></span></div>
  <div class="tt-row">roi vs retail: <span id="tt-roi"></span></div>
  <div class="tt-row">data quality: <span id="tt-quality"></span></div>
</div>
</body>
